<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MHRS | Modern Sağlık Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Soft hastane konsepti arka planı */
            background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        /* Buzlu Cam (Glassmorphism) Efekti */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 131, 143, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 2.5rem;
        }
        .brand-icon {
            color: #00acc1;
            background: #e0f7fa;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            box-shadow: 0 4px 15px rgba(0, 172, 193, 0.2);
        }
        .brand-title {
            color: #00838f;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        /* Sekme Tasarımları */
        .nav-tabs { border-bottom: none; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .nav-tabs .nav-link {
            border: none;
            border-radius: 50px;
            color: #546e7a;
            font-weight: 500;
            padding: 10px 20px;
            transition: all 0.3s ease;
            background: transparent;
        }
        .nav-tabs .nav-link:hover { background: #f0f4f8; color: #00acc1; }
        .nav-tabs .nav-link.active {
            background: #00acc1;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 172, 193, 0.3);
        }
        .nav-tabs .nav-link.doctor-tab.active {
            background: #00bfa5;
            box-shadow: 0 4px 15px rgba(0, 191, 165, 0.3);
        }
        /* Form Elemanları */
        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #cfd8dc;
            background: #f8fbfc;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #00acc1;
            box-shadow: 0 0 0 0.2rem rgba(0, 172, 193, 0.15);
            background: #ffffff;
        }
        .form-label { font-size: 0.85rem; color: #78909c; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Butonlar */
        .btn-custom {
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover { transform: translateY(-3px); }
        .btn-patient { background: linear-gradient(45deg, #00acc1, #26c6da); border: none; color: white; box-shadow: 0 4px 15px rgba(0, 172, 193, 0.3); }
        .btn-doctor { background: linear-gradient(45deg, #00bfa5, #1de9b6); border: none; color: white; box-shadow: 0 4px 15px rgba(0, 191, 165, 0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-sm-8 col-11">
            <div class="glass-card">
                <div class="text-center mb-4">
                    <div class="brand-icon">
                        <i class="fa-solid fa-heart-pulse fa-2x"></i>
                    </div>
                    <h2 class="brand-title">MHRS Portal</h2>
                    <p class="text-muted" style="font-size: 0.9rem;">Modern Sağlık Asistanınız</p>
                </div>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} alert-dismissible fade show rounded-3" style="font-size: 0.9rem;" role="alert">
                          {{ message }}
                          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <ul class="nav nav-tabs" id="myTab" role="tablist">
                  <li class="nav-item" role="presentation">
                      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login" type="button"><i class="fa-solid fa-user me-1"></i> Giriş</button>
                  </li>
                  <li class="nav-item" role="presentation">
                      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register" type="button"><i class="fa-solid fa-user-plus me-1"></i> Kayıt</button>
                  </li>
                  <li class="nav-item" role="presentation">
                      <button class="nav-link doctor-tab text-success" data-bs-toggle="tab" data-bs-target="#doctor" type="button"><i class="fa-solid fa-user-doctor me-1"></i> Hekim</button>
                  </li>
                </ul>
                
                <div class="tab-content">
                  <div class="tab-pane fade show active" id="login" role="tabpanel">
                      <form method="POST">
                          <input type="hidden" name="action" value="login">
                          <div class="mb-3">
                              <label class="form-label fw-bold"><i class="fa-regular fa-envelope me-1"></i> E-posta</label>
                              <input type="email" name="email" class="form-control" placeholder="ornek@mhrs.com" required>
                          </div>
                          <div class="mb-4">
                              <label class="form-label fw-bold"><i class="fa-solid fa-lock me-1"></i> Şifre</label>
                              <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                          </div>
                          <button type="submit" class="btn btn-custom btn-patient w-100">Giriş Yap <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i></button>
                      </form>
                  </div>
                  
                  <div class="tab-pane fade" id="register" role="tabpanel">
                      <form method="POST">
                          <input type="hidden" name="action" value="register">
                          <div class="mb-3">
                              <label class="form-label fw-bold"><i class="fa-regular fa-id-badge me-1"></i> Ad Soyad</label>
                              <input type="text" name="name" class="form-control" placeholder="Örn: Ali Yılmaz" required>
                          </div>
                          <div class="mb-3">
                              <label class="form-label fw-bold"><i class="fa-regular fa-envelope me-1"></i> E-posta</label>
                              <input type="email" name="email" class="form-control" placeholder="ornek@mhrs.com" required>
                          </div>
                          <div class="mb-4">
                              <label class="form-label fw-bold"><i class="fa-solid fa-lock me-1"></i> Şifre</label>
                              <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                          </div>
                          <button type="submit" class="btn btn-custom btn-patient w-100">Kayıt Ol <i class="fa-solid fa-user-check ms-1"></i></button>
                      </form>
                  </div>

                  <div class="tab-pane fade" id="doctor" role="tabpanel">
                      <form action="/doctor_login" method="POST">
                          <div class="mb-3">
                              <label class="form-label fw-bold text-success"><i class="fa-solid fa-hospital-user me-1"></i> Hekim E-posta</label>
                              <input type="email" name="email" class="form-control border-success-subtle" placeholder="ali@mhrs.com" required>
                          </div>
                          <div class="mb-4">
                              <label class="form-label fw-bold text-success"><i class="fa-solid fa-key me-1"></i> Şifre</label>
                              <input type="password" name="password" class="form-control border-success-subtle" value="12345" required>
                          </div>
                          <button type="submit" class="btn btn-custom btn-doctor w-100">Sisteme Gir <i class="fa-solid fa-stethoscope ms-1"></i></button>
                      </form>
                  </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
